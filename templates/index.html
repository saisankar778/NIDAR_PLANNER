<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Grid Mission Planner</title>
    <link href="static/tailwind.min.css" rel="stylesheet">
    <link href="static/leaflet.css" rel="stylesheet">
    <style>
        html, body { height: 100%; }
        #map { height: 400px; border-radius: 1rem; }

        :root {
            --covered-path-color: #ffda1f;      /* Yellow for covered path */
            --uncovered-path-color: #02be4a;    /* Orange for uncovered path */
            --grid-line-color: #05dd7c;         /* Blue for grid lines */
            --geofence-border-color: #FF1744;   /* Red for geofence border */
            --geofence-fill-color: #FFCDD2;     /* Light red for geofence fill */
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-green-50 min-h-screen">

    <div class="min-h-screen flex items-center justify-center bg-gray-100">
        <div class="bg-white rounded-2xl shadow-2xl w-full flex flex-row p-14 gap-14">
            <!-- Left: Mission Controls -->
            <div class="w-full max-w-md flex flex-col justify-between">
                <div>
                    <h2 class="text-2xl font-bold mb-4 text-blue-700">Mission Controls</h2>
                <!-- KML Upload -->
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-1">Upload KML File</label>
                        <input type="file" id="kmlFile" accept=".kml" class="p-3 border rounded w-full" />
                        <button onclick="uploadKML()" class="mt-2 bg-blue-500 text-white px-4 py-2 rounded-lg w-full">Upload KML</button>
                </div>
                    <!-- Grid Spacing -->
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-1">Grid Spacing (meters)</label>
                        <input type="number" id="gridSpacing" value="43" min="5" max="50" class="p-3 border rounded w-full" />
                        <button onclick="generateGrid()" class="mt-2 bg-green-500 text-white px-4 py-2 rounded-lg w-full">Generate Grid</button>
                </div>
                    <!-- Start Mission -->
                    <button onclick="startMission(1)" id="startMission1" class="w-full bg-red-500 text-white px-4 py-2 rounded-lg mb-4">Start Mission</button>

                    <!-- Drone Video Stream -->
                    <div class="mb-4">
                        <h2 class="text-xl font-semibold mb-3 text-blue-600">Drone Video Stream</h2>
                        <img id="cameraFeed" src="/video_feed" style="width: 100%; height: 180px; background: #222; object-fit: cover; border-radius: 0.5rem;" />
                        <div class="text-xs text-gray-600 mt-2">
                            Person detection: <span id="personDetected">No</span>
                                </div>
                                </div>
                            </div>
                <!-- Drone Controls -->
                <div class="bg-yellow-50 rounded-xl shadow p-4 mb-4">
                    <div class="flex flex-row gap-4">
                        <div class="flex-1">
                            <h3 class="font-semibold text-blue-700 mb-2">ResQ 1</h3>
                            <input type="text" id="drone1Connection" value="udp:127.0.0.1:14560" class="w-full p-2 border rounded mb-2" />
                            <button onclick="connectDrone(1)" id="connectDrone1" class="w-full bg-green-500 text-white px-3 py-2 rounded-lg mb-2">Connect</button>
                            <button onclick="disconnectDrone(1)" id="disconnectDrone1" class="w-full bg-gray-500 text-white px-3 py-2 rounded-lg mb-2" disabled>Disconnect</button>
                            <button onclick="triggerRTL(1)" id="rtlDrone1" class="w-full bg-yellow-500 text-white px-3 py-2 rounded-lg">RTL</button>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-semibold text-green-700 mb-2">ResQ 2</h3>
                            <input type="text" id="drone2Connection" value="udp:127.0.0.1:14580" class="w-full p-2 border rounded mb-2" />
                            <button onclick="connectDrone(2)" id="connectDrone2" class="w-full bg-green-500 text-white px-3 py-2 rounded-lg mb-2">Connect</button>
                            <button onclick="disconnectDrone(2)" id="disconnectDrone2" class="w-full bg-gray-500 text-white px-3 py-2 rounded-lg mb-2" disabled>Disconnect</button>
                            <button onclick="triggerRTL(2)" id="rtlDrone2" class="w-full bg-yellow-500 text-white px-3 py-2 rounded-lg">RTL</button>
                        </div>
                    </div>
                </div>
                <!-- Status/Error -->
                <div id="status" class="p-3 bg-gray-100 rounded-xl text-sm text-center shadow-inner"></div>
            </div>
            <!-- Right: Mission Map -->
            <div class="flex-1 flex flex-col">
                <h2 class="text-2xl font-bold mb-4 text-blue-700">Mission Map</h2>
                <div id="map" class="rounded-2xl shadow-lg flex-1 min-h-[400px]"></div>
                <!-- Drone Details Section -->
                <div class="bg-gray-50 p-4 rounded-xl text-sm shadow-inner mt-6">
                    <h4 class="font-semibold mb-2">Drone Status</h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <h5 class="font-semibold text-blue-700 mb-1">ResQ 1</h5>
                            <div>Mode: <span id="drone1Mode">--</span></div>
                            <div>Armed: <span id="drone1Armed">--</span></div>
                            <div>Battery: <span id="drone1Battery">--</span></div>
                            <div>Altitude: <span id="drone1StatusAltitude">--</span></div>
                        </div>
                        <div>
                            <h5 class="font-semibold text-green-700 mb-1">ResQ 2</h5>
                            <div>Mode: <span id="drone2Mode">--</span></div>
                            <div>Armed: <span id="drone2Armed">--</span></div>
                            <div>Battery: <span id="drone2Battery">--</span></div>
                            <div>Altitude: <span id="drone2StatusAltitude">--</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Loading Indicator (always on top, overlays everything) -->
        <div id="loading" class="fixed inset-0 bg-gray-500 bg-opacity-50 flex items-center justify-center" style="display: none; z-index: 2147483647;">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto"></div>
            <p class="mt-4 text-center text-white"></p>
        </div>
        <!-- Status/Error as Toast Popup -->
        <div id="toast" style="display:none;position:fixed;top:30px;left:50%;transform:translateX(-50%);z-index:2147483647;min-width:200px;padding:12px 24px;background:#222;color:#fff;border-radius:8px;font-size:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.15);text-align:center;"></div>
    </div>

    <script src="static/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator@1.7.0/dist/leaflet.polylineDecorator.min.js"></script>

    <script>
        // Initialize Leaflet map
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles © Esri'
        }).addTo(map);

        const droneIcon1 = L.icon({
            iconUrl: 'static/D.png',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });
        const droneIcon2 = L.icon({
            iconUrl: 'static/D2.png',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });
        let droneMarkers = {1: null, 2: null};
        let dronePath = [];
        let dronePolyline = null;
        let missionPolyline = null;

        let currentPolygon = null;
        let currentGeofence = null;
        let currentGrid = null;
        let gridPath = null;
        let geofencePath = null;
        let lastPersonDetected = false;
        let personMarkers = [];

        let hasEnteredPolygon = false;
        let wasInsidePolygon = false;

        // === Path color settings (change here as needed) ===
        const COVERED_PATH_COLOR = getComputedStyle(document.documentElement).getPropertyValue('--covered-path-color').trim();
const UNCOVERED_PATH_COLOR = getComputedStyle(document.documentElement).getPropertyValue('--uncovered-path-color').trim();
const GRID_LINE_COLOR = getComputedStyle(document.documentElement).getPropertyValue('--grid-line-color').trim();
const GEOFENCE_BORDER_COLOR = getComputedStyle(document.documentElement).getPropertyValue('--geofence-border-color').trim();
const GEOFENCE_FILL_COLOR = getComputedStyle(document.documentElement).getPropertyValue('--geofence-fill-color').trim();

        // File upload and grid generation functions
        async function uploadKML() {
            // Clear existing layers and arrays before uploading new KML
            if (gridPath) {
                map.removeLayer(gridPath);
                gridPath = null;
            }
            if (dronePolyline) {
                map.removeLayer(dronePolyline);
                dronePolyline = null;
            }
            if (missionPolyline) {
                map.removeLayer(missionPolyline);
                missionPolyline = null;
            }
            if (droneMarkers[1]) {
                map.removeLayer(droneMarkers[1]);
                droneMarkers[1] = null;
            }
            if (droneMarkers[2]) {
                map.removeLayer(droneMarkers[2]);
                droneMarkers[2] = null;
            }
            dronePath = [];
            if (window.gridMarkers) {
                window.gridMarkers.forEach(m => map.removeLayer(m));
                window.gridMarkers = [];
            }

            showLoading();
            const fileInput = document.getElementById('kmlFile');
            const file = fileInput.files[0];

            if (!file) {
                showStatus('Please select a KML file', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload-kml', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    // Clear existing layers
                    if (currentPolygon) map.removeLayer(currentPolygon);
                    if (currentGeofence) map.removeLayer(currentGeofence);

                    // Add polygon
                    currentPolygon = L.polygon(result.coordinates, {color: 'blue', fillColor: 'cyan', fillOpacity: 0.2}).addTo(map);

                    // Add geofence
                    currentGeofence = L.polygon(result.geofence, {
                        color: 'red', 
                        fillColor: 'red', 
                        fillOpacity: 0.1,
                        dashArray: '5, 5'
                    }).addTo(map);

                    map.fitBounds(currentPolygon.getBounds());
                    showStatus('KML uploaded successfully!', 'success');
                } else {
                    showStatus('Error: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('Upload failed: ' + error.message, 'error');
            } finally {
                hideLoading();
            }
        }

        async function generateGrid() {
            // Clear existing layers and arrays before generating new grid
            if (gridPath) {
                map.removeLayer(gridPath);
                gridPath = null;
            }
            if (dronePolyline) {
                map.removeLayer(dronePolyline);
                dronePolyline = null;
            }
            if (missionPolyline) {
                map.removeLayer(missionPolyline);
                missionPolyline = null;
            }
            if (droneMarkers[1]) {
                map.removeLayer(droneMarkers[1]);
                droneMarkers[1] = null;
            }
            if (droneMarkers[2]) {
                map.removeLayer(droneMarkers[2]);
                droneMarkers[2] = null;
            }
            dronePath = [];
            if (window.gridMarkers) {
                window.gridMarkers.forEach(m => map.removeLayer(m));
                window.gridMarkers = [];
            }

            showLoading();

            try {
                const response = await fetch('/generate-grid', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({spacing: parseFloat(document.getElementById('gridSpacing').value)})
                });
                const result = await response.json();

                if (result.success) {
                    // Clear existing grid
                    if (gridPath) map.removeLayer(gridPath);

                    // Add grid path
                    gridPath = L.polyline(result.grid, {
                        color: GRID_LINE_COLOR,
                        weight: 2,
                        opacity: 0.7,
                        dashArray: '8, 8'
                    }).addTo(map);

                    // Add waypoint markers
                    result.grid.forEach((point, index) => {
                        L.circleMarker(point, {radius: 3, color: 'green', fillColor: 'green'})
                         .bindPopup(`Waypoint ${index + 1}`).addTo(map);
                    });

                    showStatus(`Grid generated with ${result.grid.length} waypoints`, 'success');
                } else {
                    showStatus('Error: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('Grid generation failed: ' + error.message, 'error');
            } finally {
                hideLoading();
            }
        }

        // Helper functions for showing and hiding status and loading indicators
        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            const colors = {
                'success': 'text-green-600',
                'error': 'text-red-600',
                'info': 'text-blue-600'
            };
            statusDiv.innerHTML = `<span class="${colors[type]}">${message}</span>`;

            // Show toast popup
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            toast.style.backgroundColor = type === 'error' ? '#d9534f' : '#5cb85c'; // Red for error, green for success
            setTimeout(() => {
                toast.style.display = 'none';
            }, 5000); // Hide after 5 seconds
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // --- Drone Control Functions ---
        async function connectDrone(droneId) {
            const inputId = droneId === 1 ? 'drone1Connection' : 'drone2Connection';
            const connectionString = document.getElementById(inputId).value;
            showLoading();
            try {
                const response = await fetch('/connect-drone', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({drone_id: droneId, connection_string: connectionString})
                });
                const result = await response.json();
                if (result.success) {
                    showStatus(result.message, 'success');
                    document.getElementById(`connectDrone${droneId}`).disabled = true;
                    document.getElementById(`disconnectDrone${droneId}`).disabled = false;
                } else {
                    showStatus(result.error, 'error');
                }
            } catch (error) {
                showStatus('Connect failed: ' + error.message, 'error');
            } finally {
                hideLoading();
            }
        }

        async function disconnectDrone(droneId) {
            showLoading();
            try {
                const response = await fetch('/disconnect-drone', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({drone_id: droneId})
                });
                const result = await response.json();
                if (result.success) {
                    showStatus(result.message, 'success');
                    document.getElementById(`connectDrone${droneId}`).disabled = false;
                    document.getElementById(`disconnectDrone${droneId}`).disabled = true;
                } else {
                    showStatus(result.error, 'error');
                }
            } catch (error) {
                showStatus('Disconnect failed: ' + error.message, 'error');
            } finally {
                hideLoading();
            }
        }

        async function triggerRTL(droneId) {
            showLoading();
            try {
                const response = await fetch('/trigger-rtl', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({drone_id: droneId})
                });
                const result = await response.json();
                if (result.success) {
                    showStatus('RTL triggered for Drone ' + droneId, 'success');
                } else {
                    showStatus(result.error, 'error');
                }
            } catch (error) {
                showStatus('RTL failed: ' + error.message, 'error');
            } finally {
                hideLoading();
            }
        }

        async function startMission(droneId) {
            showLoading();
            try {
                // Send the current grid as shown in the UI
                const response = await fetch('/start-mission', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        drone_id: droneId,
                        grid: gridPath ? gridPath.getLatLngs().map(pt => [pt.lat, pt.lng]) : []
                    })
                });
                const result = await response.json();
                if (result.success) {
                    showStatus(result.message, 'success');
                } else {
                    showStatus(result.error, 'error');
                }
            } catch (error) {
                showStatus('Start mission failed: ' + error.message, 'error');
            } finally {
                hideLoading();
            }
        }

        // --- Drone Status Polling ---
        async function pollDroneStatus() {
            try {
                const response = await fetch('/drone-status');
                const result = await response.json();
                if (result.drones) {
                    for (let i = 1; i <= 2; i++) {
                        const status = result.drones[i]?.status || {};
                        document.getElementById(`drone${i}Mode`).textContent = status.mode || '--';
                        document.getElementById(`drone${i}Armed`).textContent = status.armed !== undefined ? status.armed : '--';
                        document.getElementById(`drone${i}Battery`).textContent = status.battery !== undefined ? status.battery : '--';
                        document.getElementById(`drone${i}StatusAltitude`).textContent = status.altitude !== undefined ? status.altitude : '--';

                        // Show drone marker on map if position available
                        if (status.latitude && status.longitude) {
                            const latlng = [status.latitude, status.longitude];
                            const icon = i === 1 ? droneIcon1 : droneIcon2;
                            if (!droneMarkers[i]) {
                                droneMarkers[i] = L.marker(latlng, {icon}).addTo(map);
                            } else {
                                droneMarkers[i].setLatLng(latlng);
                            }
                        }
                    }
                }
                // Update person detection status
                if (typeof result.person_detected !== "undefined") {
                    document.getElementById("personDetected").textContent = result.person_detected ? "Yes" : "No";
                }

                const drone1 = result.drones[1]?.status;
                if (drone1 && drone1.latitude && drone1.longitude) {
                    const latlng = [drone1.latitude, drone1.longitude];
                    // Update marker
                    if (!droneMarkers[1]) {
                        droneMarkers[1] = L.marker(latlng, {icon: droneIcon1}).addTo(map);
                    } else {
                        droneMarkers[1].setLatLng(latlng);
                    }
                    // Always draw the drone path regardless of polygon presence
                    dronePath.push(latlng);
                    if (dronePolyline) map.removeLayer(dronePolyline);
                    dronePolyline = L.polyline(dronePath, {color: COVERED_PATH_COLOR, weight: 5}).addTo(map);
                }
            } catch (error) {
                console.error('Error polling drone status:', error);
            }
        }
        setInterval(pollDroneStatus, 2000);

        // Person location functions
        async function loadPersonLocations() {
            // Remove old markers
            personMarkers.forEach(m => map.removeLayer(m));
            personMarkers = [];

            const response = await fetch('/person-locations');
            const locations = await response.json();
            locations.forEach(loc => {
                const marker = L.marker([parseFloat(loc.latitude), parseFloat(loc.longitude)], {
                    icon: L.icon({
                        iconUrl: 'static/person.png',
                        iconSize: [32, 32],
                        iconAnchor: [16, 32]
                    })
                }).addTo(map);
                marker.bindTooltip(
                    `${loc.id}: ${parseFloat(loc.latitude).toFixed(6)}, ${parseFloat(loc.longitude).toFixed(6)}`,
                    {permanent: false, direction: 'top'}
                );
                personMarkers.push(marker);
            });
        }

        // Initial load
        loadPersonLocations();
        // Optional: refresh every 5 seconds
        setInterval(loadPersonLocations, 5000);

        // Assume `grid` is your array of [lat, lon] waypoints from the backend
var latlngs = grid.map(function(pt) { return [pt[0], pt[1]]; });
var polyline = L.polyline(latlngs, {color: 'yellow', weight: 3}).addTo(map);
var decorator = L.polylineDecorator(polyline, {
  patterns: [
    {
      offset: 25, // distance in pixels or percentage
      repeat: 50,
      symbol: L.Symbol.arrowHead({pixelSize: 12, polygon: false, pathOptions: {stroke: true, color: 'red'}})
    }
  ]
}).addTo(map);
    </script>

</body>
</html>
